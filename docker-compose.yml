version: "3.9"


volumes:
  postgres_data:

networks:
  app-net:

services:
  rbac-postgres:
    image: postgres:15 
    container_name: rbac-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rbac_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rbac_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-net
  

  rbac-app:
    image: rbac-team-app:latest 
    container_name: rbac-app
    depends_on:
      rbac-postgres:
         condition: service_healthy

    environment:
      DATABASE_URL: postgresql://postgres:password@rbac-postgres:5432/rbac_db 
    ports:
      - "3000:3000"

    networks:
      - app-net

    